name: CI Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run unit tests
        run: dotnet test SeatTooLong.Tests --verbosity minimal
